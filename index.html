<!DOCTYPE html>
<html lang="nb">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Min side</title>
  <style>
    * { box-sizing: border-box; margin: 0; }
    body {
      font-family: system-ui, sans-serif;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: linear-gradient(135deg, #2563eb, #111827);
      color: white;
      padding: 24px;
    }
    .box {
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 20px;
      padding: 32px;
      max-width: 480px;
      text-align: center;
      backdrop-filter: blur(8px);
    }
    h1 { margin-bottom: 12px; }
    p { opacity: 0.9; line-height: 1.6; }
    button {
      margin-top: 20px;
      padding: 12px 20px;
      border: 0;
      border-radius: 12px;
      background: white;
      color: #2563eb;
      font-weight: 700;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="box">
    <h1>Min side</h1>
    <p>Dette er en nettside Nora kodet for deg. Rediger teksten og lagre filen som index.html.</p>
    <button onclick="alert('Hei fra Min side!')">Trykk meg</button>
  </div>

</body>
</html>
